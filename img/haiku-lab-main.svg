<svg width="420" height="290" viewBox="0 0 420 290" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- Three-line haiku structure (5-7-5) representing human-AI collaboration -->
  <g id="haiku-structure">
    <!-- Top line (5 elements) - Human input -->
    <g id="line-one">
      <circle cx="130" cy="60" r="7" fill="#1E3A5F"/>
      <circle cx="165" cy="60" r="7" fill="#1E3A5F"/>
      <circle cx="200" cy="60" r="7" fill="#1E3A5F"/>
      <circle cx="235" cy="60" r="7" fill="#1E3A5F"/>
      <circle cx="270" cy="60" r="7" fill="#1E3A5F"/>
      <line x1="120" y1="60" x2="280" y2="60" stroke="#1E3A5F" stroke-width="1.5" opacity="0.25"/>
    </g>
    
    <!-- Middle line (7 elements) - Human-AI collaboration -->
    <g id="line-two">
      <circle cx="115" cy="95" r="7" fill="#1E3A5F"/>
      <circle cx="145" cy="95" r="7" fill="#00BFC4"/>
      <circle cx="175" cy="95" r="7" fill="#1E3A5F"/>
      <circle cx="205" cy="95" r="7" fill="#00BFC4"/>
      <circle cx="235" cy="95" r="7" fill="#1E3A5F"/>
      <circle cx="265" cy="95" r="7" fill="#00BFC4"/>
      <circle cx="295" cy="95" r="7" fill="#1E3A5F"/>
      <line x1="105" y1="95" x2="305" y2="95" stroke="#00BFC4" stroke-width="1.5" opacity="0.3"/>
    </g>
    
    <!-- Bottom line (5 elements) - AI output -->
    <g id="line-three">
      <circle cx="150" cy="130" r="7" fill="#00BFC4"/>
      <circle cx="185" cy="130" r="7" fill="#00BFC4"/>
      <circle cx="220" cy="130" r="7" fill="#00BFC4"/>
      <circle cx="255" cy="130" r="7" fill="#00BFC4"/>
      <circle cx="290" cy="130" r="7" fill="#00BFC4"/>
      <line x1="140" y1="130" x2="300" y2="130" stroke="#00BFC4" stroke-width="1.5" opacity="0.25"/>
    </g>
    
    <!-- Subtle connecting flows -->
    <g opacity="0.15">
      <path d="M 200 67 L 175 88" stroke="#718096" stroke-width="1"/>
      <path d="M 235 67 L 235 88" stroke="#718096" stroke-width="1"/>
      <path d="M 175 102 L 185 123" stroke="#718096" stroke-width="1"/>
      <path d="M 235 102 L 255 123" stroke="#718096" stroke-width="1"/>
    </g>
  </g>

  <!-- Text with embedded font -->
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Sora:wght@400;500;600;700;800&amp;family=IBM+Plex+Mono:wght@400;500&amp;display=swap');
  </style>
  
  <text x="210" y="180" font-family="'IBM Plex Mono', monospace" font-size="12" font-weight="500" fill="#718096" text-anchor="middle" letter-spacing="2">
    PRINCETON
  </text>
  
  <!-- HAIKU with AI highlighted -->
  <text x="210" y="230" font-family="'Sora', sans-serif" font-size="56" font-weight="700" fill="#1E3A5F" text-anchor="middle" letter-spacing="0.8">
    H<tspan fill="#00BFC4">AI</tspan>KU
  </text>
  
  <text x="210" y="258" font-family="'Sora', sans-serif" font-size="18" font-weight="600" fill="#A7A9AC" text-anchor="middle" letter-spacing="1">
    Lab
  </text>
</svg>